<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Corner Radii</div>
  <div class="row" style="gap:18px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:72px;height:48px;background:var(--olive);border-radius:8px"></div>
      <div class="mono">Input · 8</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:72px;height:48px;background:var(--olive);border-radius:12px"></div>
      <div class="mono">Button · 12</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:72px;height:48px;background:#fff;border:1px solid var(--canvas-300);border-radius:12px"></div>
      <div class="mono">Card · 12</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="background:var(--gold);color:var(--ink);border-radius:100px;padding:6px 14px;font-size:11px;font-weight:600">PENDING</div>
      <div class="mono">Pill · 100</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:56px;height:56px;background:var(--olive);border-radius:22%;display:flex;align-items:center;justify-content:center;color:var(--canvas);font-family:var(--font-arabic);font-weight:700;font-size:34px;line-height:1">د</div>
      <div class="mono">Icon · 22%</div>
    </div>
    <div style="margin-left:auto;font-size:12px;color:var(--ink-light);max-width:200px;text-align:right">Confident, not sharp, not bubbly. Pills only for status; everything structural is 12.</div>
  </div>
</div></body></html>
