<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:var(--canvas-200)">
  <div dir="ltr" class="label">Shop Card · Canvas surface · subtle shadow</div>
  <div style="background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(15,26,23,.04), 0 4px 12px rgba(15,26,23,.04);overflow:hidden;display:flex;font-family:var(--font-arabic)">
    <div style="width:92px;background:linear-gradient(135deg,#1F4A3D 0%,#173629 100%);display:flex;align-items:center;justify-content:center;color:var(--canvas);font-weight:700;font-size:34px;font-family:var(--font-arabic)">أ</div>
    <div style="flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:6px" dir="rtl">
      <div style="display:flex;align-items:center;gap:8px;justify-content:space-between">
        <div style="font-size:16px;font-weight:600;color:var(--ink)">سوبر ماركت أبو حسن</div>
        <div style="background:rgba(31,74,61,0.08);color:#1F4A3D;border-radius:100px;padding:3px 10px;font-size:11px;font-weight:600">مفتوح</div>
      </div>
      <div style="font-size:13px;color:var(--ink-light)">بقالة · شارع الجلاء · ٤٠٠ متر</div>
      <div style="display:flex;align-items:center;gap:14px;margin-top:4px">
        <div style="font-size:12px;color:var(--ink-light)"><span style="color:var(--gold);font-size:13px">★</span> ٤٫٨</div>
        <div style="font-size:12px;color:var(--ink-light)">١٥ – ٢٠ دقيقة</div>
        <div style="font-size:12px;color:var(--ink-light)">توصيل ١٠ ج.م</div>
      </div>
    </div>
  </div>
</div></body></html>
