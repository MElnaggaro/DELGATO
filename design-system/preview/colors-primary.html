<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="gap:24px;align-items:flex-end">
    <div style="flex:1;min-width:0">
      <div class="label">Deep Olive · Primary</div>
      <div style="font-size:34px;font-weight:700;letter-spacing:-0.01em;color:var(--olive)">دلنجاتُو</div>
    </div>
    <div class="swatch" style="max-width:140px"><div class="chip" style="background:#1F4A3D"></div>
      <div class="meta"><div class="name">Deep Olive</div><div class="hex">#1F4A3D</div></div></div>
    <div class="swatch" style="max-width:140px"><div class="chip" style="background:#FAF8F3;border-bottom:1px solid var(--canvas-300)"></div>
      <div class="meta"><div class="name">Warm Canvas</div><div class="hex">#FAF8F3</div></div></div>
    <div class="swatch" style="max-width:140px"><div class="chip" style="background:#E8B14F"></div>
      <div class="meta"><div class="name">Warm Gold</div><div class="hex">#E8B14F</div></div></div>
    <div class="swatch" style="max-width:140px"><div class="chip" style="background:#0F1A17"></div>
      <div class="meta"><div class="name">Ink</div><div class="hex">#0F1A17</div></div></div>
    <div class="swatch" style="max-width:140px"><div class="chip" style="background:#4A5C57"></div>
      <div class="meta"><div class="name">Ink Light</div><div class="hex">#4A5C57</div></div></div>
  </div>
  <div class="row" style="justify-content:space-between">
    <div class="caption" style="color:var(--ink-light);font-size:12px">5 tokens carry the entire system · canvas is never pure white</div>
    <div class="mono">olive 10% &nbsp; canvas 60% &nbsp; ink 25% &nbsp; gold 5%</div>
  </div>
</div></body></html>
