<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Status Colors · Badges only</div>
  <div class="row" style="gap:16px;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-start">
      <div style="background:#1F4A3D;color:#FAF8F3;border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600">Active</div>
      <div class="mono">#1F4A3D · olive</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-start">
      <div style="background:#E8B14F;color:#0F1A17;border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600">Pending</div>
      <div class="mono">#E8B14F · gold</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-start">
      <div style="background:#C53B2C;color:#FAF8F3;border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600">Issue</div>
      <div class="mono">#C53B2C · warm red</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-start;margin-inline-start:auto">
      <div style="background:rgba(31,74,61,0.08);color:#1F4A3D;border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600">Tinted active</div>
      <div class="mono">olive @ 8%</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--ink-light)">Status colors are never used as surfaces — only as 100px-radius pill badges sized to the text.</div>
</div></body></html>
