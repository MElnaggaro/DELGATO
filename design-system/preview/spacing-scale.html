<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Spacing · 4px base · multiples only</div>
  <div style="display:flex;align-items:flex-end;gap:24px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:4px;height:4px;background:var(--olive)"></div>
      <div class="mono">xs · 4</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:8px;height:8px;background:var(--olive)"></div>
      <div class="mono">sm · 8</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:16px;height:16px;background:var(--olive)"></div>
      <div class="mono">md · 16</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:32px;height:32px;background:var(--olive)"></div>
      <div class="mono">lg · 32</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:64px;height:64px;background:var(--olive)"></div>
      <div class="mono">xl · 64</div>
    </div>
    <div style="margin-left:auto;font-size:12px;color:var(--ink-light);max-width:220px;text-align:right">Every gap, padding, and inset in the system resolves to one of these five values.</div>
  </div>
</div></body></html>
