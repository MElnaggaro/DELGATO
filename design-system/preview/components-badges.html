<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div dir="ltr" class="label">Status Badges · 100px radius · 11–12px micro</div>
  <div class="row" style="gap:10px;flex-wrap:wrap;font-family:var(--font-arabic)">
    <div style="background:rgba(31,74,61,0.08);color:#1F4A3D;border-radius:100px;padding:4px 12px;font-size:12px;font-weight:600">قيد التحضير</div>
    <div style="background:rgba(232,177,79,0.18);color:#8a6418;border-radius:100px;padding:4px 12px;font-size:12px;font-weight:600">في الانتظار</div>
    <div style="background:rgba(197,59,44,0.10);color:#A1271C;border-radius:100px;padding:4px 12px;font-size:12px;font-weight:600">في مشكلة</div>
    <div style="background:#1F4A3D;color:var(--canvas);border-radius:100px;padding:4px 12px;font-size:12px;font-weight:600">في الطريق</div>
    <div style="background:#E8B14F;color:var(--ink);border-radius:100px;padding:4px 12px;font-size:12px;font-weight:600">عرض اليوم</div>
    <div style="background:var(--ink);color:var(--canvas);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:600;letter-spacing:0.04em">جديد</div>
    <div style="background:transparent;border:1px solid var(--canvas-300);color:var(--ink-light);border-radius:100px;padding:4px 12px;font-size:12px;font-weight:500">مغلق</div>
  </div>
  <div dir="ltr" style="font-size:12px;color:var(--ink-light)">Two variants — tinted (subtle) for inline list states, filled (loud) for header strips and offers.</div>
</div></body></html>
