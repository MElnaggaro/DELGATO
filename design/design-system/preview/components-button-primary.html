<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div dir="ltr" class="label">Primary Button · States</div>
  <div class="row" style="gap:14px;flex-wrap:wrap;font-family:var(--font-arabic)">
    <button style="border:0;background:var(--olive);color:var(--canvas);font:600 16px/1 var(--font-arabic);padding:14px 24px;border-radius:12px;min-height:48px;cursor:pointer">اطلب دلوقتي</button>
    <button style="border:0;background:#173629;color:var(--canvas);font:600 16px/1 var(--font-arabic);padding:14px 24px;border-radius:12px;min-height:48px">اطلب دلوقتي</button>
    <button style="border:0;background:var(--olive);color:var(--canvas);font:600 16px/1 var(--font-arabic);padding:14px 24px;border-radius:12px;min-height:48px;box-shadow:inset 0 0 0 2px var(--gold)">اطلب دلوقتي</button>
    <button style="border:0;background:var(--olive);color:var(--canvas);font:600 16px/1 var(--font-arabic);padding:14px 24px;border-radius:12px;min-height:48px;opacity:0.4;cursor:not-allowed">اطلب دلوقتي</button>
  </div>
  <div class="row" style="gap:32px" dir="ltr">
    <div class="mono">default</div>
    <div class="mono" style="margin-inline-start:60px">hover</div>
    <div class="mono" style="margin-inline-start:42px">pressed · 2px gold inset</div>
    <div class="mono" style="margin-inline-start:18px">disabled · 40%</div>
  </div>
</div></body></html>
