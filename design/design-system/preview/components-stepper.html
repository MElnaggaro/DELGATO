<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div dir="ltr" class="label">Order Status Stepper · مراحل الطلب</div>
  <div style="font-family:var(--font-arabic);background:#fff;border:1px solid var(--canvas-300);border-radius:12px;padding:18px 20px" dir="rtl">
    <div style="display:flex;align-items:center;gap:6px">
      <!-- step 1 done -->
      <div style="width:24px;height:24px;border-radius:50%;background:#1F4A3D;color:var(--canvas);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">✓</div>
      <div style="flex:1;height:2px;background:#1F4A3D"></div>
      <div style="width:24px;height:24px;border-radius:50%;background:#1F4A3D;color:var(--canvas);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">✓</div>
      <div style="flex:1;height:2px;background:#1F4A3D"></div>
      <div style="width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid #1F4A3D;color:#1F4A3D;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700"></div>
      <div style="flex:1;height:2px;background:var(--canvas-300)"></div>
      <div style="width:24px;height:24px;border-radius:50%;background:var(--canvas-200);color:var(--ink-mute);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--ink-light);font-weight:500">
      <div style="color:var(--ink);font-weight:600">تم الاستلام</div>
      <div style="color:var(--ink);font-weight:600">يتم التحضير</div>
      <div style="color:#1F4A3D;font-weight:700">في الطريق</div>
      <div>تم التوصيل</div>
    </div>
  </div>
</div></body></html>
