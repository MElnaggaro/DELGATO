<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:var(--canvas-200);padding:18px">
  <div dir="ltr" class="label">Bottom Tab Bar · iOS/Android pattern · olive active</div>
  <div style="background:rgba(250,248,243,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--canvas-300);border-radius:18px;padding:10px 8px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;font-family:var(--font-arabic)" dir="rtl">
    <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;color:#1F4A3D">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      <span style="font-size:11px;font-weight:600">الرئيسية</span>
    </button>
    <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;color:#4A5C57">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <span style="font-size:11px;font-weight:500">بحث</span>
    </button>
    <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;color:#4A5C57;position:relative">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h2l2.4 12.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 7H6"/><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
      <span style="font-size:11px;font-weight:500">السلة</span>
      <span style="position:absolute;top:0;right:14px;background:#E8B14F;color:var(--ink);font-size:10px;font-weight:700;border-radius:100px;padding:1px 6px">٣</span>
    </button>
    <button style="border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;color:#4A5C57">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span style="font-size:11px;font-weight:500">حسابي</span>
    </button>
  </div>
</div></body></html>
