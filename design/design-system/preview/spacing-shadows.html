<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:var(--canvas-200)">
  <div class="label">Elevation · subtle, ink-tinted</div>
  <div class="row" style="gap:24px;align-items:stretch;padding:8px 0">
    <div style="flex:1;background:#FFFFFF;border-radius:12px;padding:18px;box-shadow:none;border:1px solid var(--canvas-300)">
      <div style="font-weight:600;color:var(--ink);font-size:14px">Hairline</div>
      <div class="mono" style="margin-top:6px">1px solid · #E8E2D2</div>
    </div>
    <div style="flex:1;background:#FFFFFF;border-radius:12px;padding:18px;box-shadow:0 1px 2px rgba(15,26,23,.04), 0 4px 12px rgba(15,26,23,.04)">
      <div style="font-weight:600;color:var(--ink);font-size:14px">Card</div>
      <div class="mono" style="margin-top:6px">1·2 + 4·12 · 4% ink</div>
    </div>
    <div style="flex:1;background:#FFFFFF;border-radius:12px;padding:18px;box-shadow:0 2px 4px rgba(15,26,23,.05), 0 12px 28px rgba(15,26,23,.08)">
      <div style="font-weight:600;color:var(--ink);font-size:14px">Lift</div>
      <div class="mono" style="margin-top:6px">2·4 + 12·28 · 8% ink</div>
    </div>
    <div style="flex:1;background:var(--olive);color:var(--canvas);border-radius:12px;padding:18px;box-shadow:inset 0 0 0 2px var(--gold)">
      <div style="font-weight:600;font-size:14px">Press</div>
      <div class="mono" style="margin-top:6px;color:rgba(250,248,243,.7)">inset 2px gold</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--ink-light)">Cards carry either a hairline border <em>or</em> a soft shadow — never both. No harsh elevation.</div>
</div></body></html>
