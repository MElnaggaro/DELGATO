<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div dir="ltr" class="label">Category Chip Row · horizontal, scroll-snap</div>
  <div style="display:flex;gap:10px;overflow:hidden;font-family:var(--font-arabic)" dir="rtl">
    <button style="border:0;background:#1F4A3D;color:var(--canvas);padding:10px 16px;border-radius:100px;font-size:14px;font-weight:600;white-space:nowrap;cursor:pointer">الكل</button>
    <button style="border:1px solid var(--canvas-300);background:#fff;color:var(--ink);padding:9px 16px;border-radius:100px;font-size:14px;font-weight:500;white-space:nowrap">بقالة</button>
    <button style="border:1px solid var(--canvas-300);background:#fff;color:var(--ink);padding:9px 16px;border-radius:100px;font-size:14px;font-weight:500;white-space:nowrap">صيدلية</button>
    <button style="border:1px solid var(--canvas-300);background:#fff;color:var(--ink);padding:9px 16px;border-radius:100px;font-size:14px;font-weight:500;white-space:nowrap">أكل</button>
    <button style="border:1px solid var(--canvas-300);background:#fff;color:var(--ink);padding:9px 16px;border-radius:100px;font-size:14px;font-weight:500;white-space:nowrap">حلويات</button>
    <button style="border:1px solid var(--canvas-300);background:#fff;color:var(--ink);padding:9px 16px;border-radius:100px;font-size:14px;font-weight:500;white-space:nowrap">خضار وفاكهة</button>
  </div>
  <div dir="ltr" style="font-size:12px;color:var(--ink-light)">Active chip is olive-filled; inactive chips carry a 1px canvas-300 border on white. Min tap height 40px.</div>
</div></body></html>
