<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div dir="ltr" class="label">Voice · 5 principles · صاحب شاطر، مش روبوت</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;font-family:var(--font-arabic)" dir="rtl">
    <div style="background:var(--canvas-200);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:18px;font-weight:700;color:#1F4A3D">واضح</div>
      <div style="font-size:11px;color:var(--ink-light);line-height:1.4">بدون دوران</div>
    </div>
    <div style="background:var(--canvas-200);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:18px;font-weight:700;color:#1F4A3D">واثق</div>
      <div style="font-size:11px;color:var(--ink-light);line-height:1.4">قول بصراحة</div>
    </div>
    <div style="background:var(--canvas-200);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:18px;font-weight:700;color:#1F4A3D">بشري</div>
      <div style="font-size:11px;color:var(--ink-light);line-height:1.4">مش template</div>
    </div>
    <div style="background:var(--canvas-200);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:18px;font-weight:700;color:#1F4A3D">محلي</div>
      <div style="font-size:11px;color:var(--ink-light);line-height:1.4">من الدلنجات</div>
    </div>
    <div style="background:#1F4A3D;border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;gap:6px;color:var(--canvas)">
      <div style="font-size:18px;font-weight:700">مختصر</div>
      <div style="font-size:11px;color:rgba(250,248,243,0.7);line-height:1.4">أقل كلمات</div>
    </div>
  </div>
</div></body></html>
