<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
@keyframes pulse-out {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(140px); }
}
@keyframes pulse-out-in {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(140px); }
}
.t-out { animation: pulse-out-in 1.8s var(--ease-out, cubic-bezier(0.16, 1, 0.3, 1)) infinite; }
.t-in  { animation: pulse-out-in 1.8s var(--ease-in, cubic-bezier(0.7, 0, 0.84, 0)) infinite; }
</style>
</head>
<body><div class="card">
  <div class="label">Motion · confident, calm — no springs</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center">
    <div>
      <div style="font-size:12px;color:var(--ink-light);margin-bottom:6px">Entrance · 300ms · ease-out</div>
      <div style="height:24px;background:var(--canvas-200);border-radius:100px;position:relative;overflow:hidden">
        <div class="t-out" style="width:24px;height:24px;border-radius:50%;background:var(--olive);position:absolute;top:0;left:0"></div>
      </div>
    </div>
    <div>
      <div style="font-size:12px;color:var(--ink-light);margin-bottom:6px">Exit · 300ms · ease-in</div>
      <div style="height:24px;background:var(--canvas-200);border-radius:100px;position:relative;overflow:hidden">
        <div class="t-in" style="width:24px;height:24px;border-radius:50%;background:var(--gold);position:absolute;top:0;left:0"></div>
      </div>
    </div>
  </div>
  <div class="row" style="gap:32px">
    <div class="mono">micro · 150ms</div>
    <div class="mono">transition · 300ms</div>
    <div class="mono" style="margin-left:auto">no bounce · no spring</div>
  </div>
</div></body></html>
