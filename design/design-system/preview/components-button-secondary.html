<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div dir="ltr" class="label">Secondary & Tertiary · Buttons</div>
  <div class="row" style="gap:14px;flex-wrap:wrap;font-family:var(--font-arabic)">
    <button style="background:var(--canvas);color:var(--olive);font:600 16px/1 var(--font-arabic);padding:13px 22px;border-radius:12px;min-height:48px;border:1.5px solid var(--olive);cursor:pointer">أضف للسلة</button>
    <button style="background:transparent;color:var(--olive);font:600 16px/1 var(--font-arabic);padding:14px 16px;border-radius:12px;min-height:48px;border:0;cursor:pointer">تخطي دلوقتي</button>
    <button style="background:var(--canvas-200);color:var(--ink);font:500 13px/1 var(--font-arabic);padding:8px 14px;border-radius:100px;border:0;cursor:pointer">إلغاء الطلب</button>
    <button style="background:var(--gold);color:var(--ink);font:600 16px/1 var(--font-arabic);padding:14px 24px;border-radius:12px;min-height:48px;border:0;cursor:pointer">عرض خاص</button>
  </div>
  <div class="row" dir="ltr" style="gap:36px">
    <div class="mono">secondary · olive border</div>
    <div class="mono">tertiary · text only</div>
    <div class="mono">chip · canvas-200 pill</div>
    <div class="mono">gold · offer banner CTA</div>
  </div>
</div></body></html>
