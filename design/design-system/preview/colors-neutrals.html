<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Neutrals · Canvas surfaces & ink tiers</div>
  <div class="row" style="align-items:stretch;gap:12px">
    <div class="swatch"><div class="chip" style="background:#FAF8F3;border-bottom:1px solid var(--canvas-300)"></div>
      <div class="meta"><div class="name">Canvas</div><div class="hex">#FAF8F3</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F2EEE3"></div>
      <div class="meta"><div class="name">Canvas 200</div><div class="hex">#F2EEE3</div></div></div>
    <div class="swatch"><div class="chip" style="background:#E8E2D2"></div>
      <div class="meta"><div class="name">Canvas 300</div><div class="hex">#E8E2D2</div></div></div>
    <div class="swatch"><div class="chip" style="background:#8A9994"></div>
      <div class="meta"><div class="name">Ink Mute</div><div class="hex">#8A9994</div></div></div>
    <div class="swatch"><div class="chip" style="background:#4A5C57"></div>
      <div class="meta"><div class="name">Ink Light</div><div class="hex">#4A5C57</div></div></div>
    <div class="swatch"><div class="chip" style="background:#0F1A17"></div>
      <div class="meta"><div class="name">Ink</div><div class="hex">#0F1A17</div></div></div>
  </div>
  <div style="font-size:12px;color:var(--ink-light)">Canvas tiers handle surface lift and dividers. Ink tiers handle text hierarchy. No grey is purely neutral — all carry a warm green undertone.</div>
</div></body></html>
